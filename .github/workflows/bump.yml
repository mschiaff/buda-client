name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (auto infers from conventional commits)"
        required: true
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run — preview changes without pushing"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Get current version
        id: current
        run: |
          current=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "Current version: $current"

      - name: Determine new version
        id: next
        run: |
          bump_type="${{ inputs.bump_type }}"

          if [[ "$bump_type" == "auto" ]]; then
            # git-cliff infers the next version from conventional commits
            new_version=$(git cliff --bumped-version | sed 's/^v//')
            if [[ -z "$new_version" || "$new_version" == "${{ steps.current.outputs.version }}" ]]; then
              echo "::error::No version bump detected from commits. Use a manual bump type instead."
              exit 1
            fi
          else
            uv version --bump "$bump_type"
            new_version=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "New version: $new_version"

      - name: Set version in pyproject.toml
        if: inputs.bump_type == 'auto'
        run: uv version "${{ steps.next.outputs.version }}"

      - name: Update lockfile
        run: uv lock

      - name: Generate changelog
        run: git cliff --tag "v${{ steps.next.outputs.version }}" --output CHANGELOG.md

      - name: Show diff (dry run)
        if: inputs.dry_run
        run: |
          echo "=== Dry Run — Changes that would be committed ==="
          git diff
          echo ""
          echo "Version: ${{ steps.current.outputs.version }} → ${{ steps.next.outputs.version }}"
          echo "Tag: v${{ steps.next.outputs.version }}"

      - name: Commit, tag, and push
        if: "!inputs.dry_run"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml uv.lock CHANGELOG.md
          git commit -m "chore(release): v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main --tags
